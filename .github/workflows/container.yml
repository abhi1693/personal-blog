name: Container

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  prepare-build-secret:
    name: Prepare build secret
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Write build environment
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
          NEXT_GOOGLE_ADSENSE_ID: ${{ vars.NEXT_GOOGLE_ADSENSE_ID }}
          NEXT_GOOGLE_ANALYTICS_ID: ${{ vars.NEXT_GOOGLE_ANALYTICS_ID }}
          NEXT_GOOGLE_TAG_MANAGER_ID: ${{ vars.NEXT_GOOGLE_TAG_MANAGER_ID }}
          NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_RESEND_AUDIENCE_ID: ${{ vars.NEXT_RESEND_AUDIENCE_ID }}
          RESEND_API_KEY_FULL: ${{ secrets.RESEND_API_KEY_FULL }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
        run: .github/scripts/write-env.sh build-secret.env

      - name: Upload build secret
        uses: actions/upload-artifact@v7
        with:
          name: personal-blog-build-secret
          path: build-secret.env
          retention-days: 1

  build:
    name: Build linux/arm64
    needs: prepare-build-secret
    uses: abhi1693/actions/.github/workflows/docker-build-push.yml@master
    with:
      runs-on: ubuntu-24.04-arm
      image: ghcr.io/${{ github.repository }}
      context: .
      file: Dockerfile
      platforms: linux/arm64
      cache-scope: personal-blog-arm64
      build-secret-artifact: personal-blog-build-secret
      build-secret-file: build-secret.env
      build-secret-id: env
      tags: |
        type=semver,pattern={{version}}
        type=raw,value=latest
      labels: |
        org.opencontainers.image.source=https://github.com/${{ github.repository }}
        org.opencontainers.image.title=personal-blog
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
