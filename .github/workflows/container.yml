name: Container

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  DO_NOT_TRACK: '1'
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Write build environment
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
          NEXT_GOOGLE_ADSENSE_ID: ${{ vars.NEXT_GOOGLE_ADSENSE_ID }}
          NEXT_GOOGLE_ANALYTICS_ID: ${{ vars.NEXT_GOOGLE_ANALYTICS_ID }}
          NEXT_GOOGLE_TAG_MANAGER_ID: ${{ vars.NEXT_GOOGLE_TAG_MANAGER_ID }}
          NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_RESEND_AUDIENCE_ID: ${{ vars.NEXT_RESEND_AUDIENCE_ID }}
          RESEND_API_KEY_FULL: ${{ secrets.RESEND_API_KEY_FULL }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
        run: .github/scripts/write-env.sh .env.local

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-${{ matrix.suffix }}
            type=raw,value=latest-${{ matrix.suffix }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            env=.env.local

  manifest:
    name: Publish manifest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-arch manifest
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          docker buildx imagetools create \
            -t "${IMAGE}:${version}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${version}-amd64" \
            "${IMAGE}:${version}-arm64"
