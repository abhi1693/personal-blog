name: Container

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Semver image version without a leading v
        required: true

permissions:
  contents: read

env:
  DO_NOT_TRACK: '1'
  REGISTRY: registry.abhimanyu-saharan.com
  IMAGE_NAME: personal-blog/personal-blog

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v6

      - name: Write build environment
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GITHUB_TOKEN: ${{ github.token }}
          NEXT_GOOGLE_ADSENSE_ID: ${{ vars.NEXT_GOOGLE_ADSENSE_ID }}
          NEXT_GOOGLE_ANALYTICS_ID: ${{ vars.NEXT_GOOGLE_ANALYTICS_ID }}
          NEXT_GOOGLE_TAG_MANAGER_ID: ${{ vars.NEXT_GOOGLE_TAG_MANAGER_ID }}
          NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ vars.NEXT_PUBLIC_SANITY_API_VERSION }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_RESEND_AUDIENCE_ID: ${{ vars.NEXT_RESEND_AUDIENCE_ID }}
          RESEND_API_KEY_FULL: ${{ secrets.RESEND_API_KEY_FULL }}
          SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
        run: .github/scripts/write-env.sh .env.local

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-${{ matrix.suffix }},enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ inputs.version }}-${{ matrix.suffix }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest-${{ matrix.suffix }}

      - name: Build image archive
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            NODE_IMAGE=${{ env.REGISTRY }}/docker.io/library/node:22.18.0-bookworm-slim
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=oci,dest=${{ runner.temp }}/personal-blog-${{ matrix.suffix }}.oci.tar
          secret-files: |
            env=.env.local

      - name: Publish with regctl
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_ARCHIVE: ${{ runner.temp }}/personal-blog-${{ matrix.suffix }}.oci.tar
          REGISTRY_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail
          regctl_config="${RUNNER_TEMP}/regctl"
          mkdir -p "${regctl_config}"
          chmod 0777 "${regctl_config}"
          printf '%s' "${REGISTRY_PASSWORD}" \
            | docker run --rm -i \
                -e REGCTL_CONFIG=/config/config.json \
                -v "${regctl_config}:/config" \
                regclient/regctl:latest \
                registry login "${REGISTRY}" -u "${REGISTRY_USERNAME}" --pass-stdin
          docker run --rm \
            -e REGCTL_CONFIG=/config/config.json \
            -v "${regctl_config}:/config" \
            regclient/regctl:latest \
            registry set "${REGISTRY}" --blob-chunk 10485760 --blob-max 1
          while IFS= read -r image_tag; do
            [ -n "${image_tag}" ] || continue
            for attempt in 1 2 3; do
              docker run --rm \
                -e REGCTL_CONFIG=/config/config.json \
                -v "${regctl_config}:/config" \
                -v "${RUNNER_TEMP}:${RUNNER_TEMP}" \
                regclient/regctl:latest \
                image import "${image_tag}" "${IMAGE_ARCHIVE}" -v info && break
              if [ "${attempt}" -eq 3 ]; then
                exit 1
              fi
              sleep $((attempt * 15))
            done
          done <<< "${IMAGE_TAGS}"

  manifest:
    name: Publish manifest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Publish multi-arch manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}
        run: |
          version="${RELEASE_TAG#v}"
          docker buildx imagetools create \
            -t "${IMAGE}:${version}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${version}-amd64" \
            "${IMAGE}:${version}-arm64"
