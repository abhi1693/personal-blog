name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Set up environment
        run: cp .vercel/.env.preview.local .env.local

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  submit_sitemap:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' || github.event_name == 'schedule'
    env:
      GOOGLE_SVC_ACCOUNT: ${{ secrets.GOOGLE_SVC_ACCOUNT }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: prj_4fGzgFZsR6ozmMaBD0sJK1dIeJiL
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Decode and store Google Service Account JSON
        run: echo "${{ secrets.GOOGLE_SVC_ACCOUNT }}" | base64 -d > scripts/service-account.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Wait for production deployment to be ready
        run: |
          # Fetch the most recent production deployment
          deployment=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&target=production&limit=1")

          deployment_id=$(echo "$deployment" | jq -r '.deployments[0].uid')
          deployment_state=$(echo "$deployment" | jq -r '.deployments[0].readyState')

          echo "Tracking deployment ID: $deployment_id"
          echo "Initial state: $deployment_state"

          # Wait only for the specific deployment ID
          while [ "$deployment_state" != "READY" ]; do
            echo "Still waiting for deployment $deployment_id to be READY..."
            sleep 10
            deployment_state=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_id" \
              | jq -r '.readyState')
          done

          echo "✅ Deployment $deployment_id is READY"

      - name: Submit Sitemap
        run: node scripts/sitemap-to-google

      - name: Submit to IndexNow
        env:
          LASTMOD_THRESHOLD_DAYS: 1
        run: node scripts/indexnow.js
